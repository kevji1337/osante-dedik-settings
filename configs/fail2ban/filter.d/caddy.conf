# Fail2ban filter for Caddy access logs
# Detects suspicious patterns in web access logs

[Definition]

# Match common attack patterns
failregex = ^<HOST> -.*"(GET|POST|HEAD).*(/admin|/wp-|/phpmyadmin|/\.env|/\.git|/config|/backup|/\.\./|/etc/passwd|/shell|/cmd|/exec).*" 404
            ^<HOST> -.*"GET.*(\.\./){3,}.*" 404
            ^<HOST> -.*"GET.*(%00|%0a|%0d|<script|javascript:).*" 404

ignoreregex =

[Init]
datepattern = %%d/%%b/%%Y:%%H:%%M:%%S %%z
