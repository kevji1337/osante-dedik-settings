# =============================================================================
# Alertmanager Configuration - Telegram Integration
# Описание: Конфигурация Alertmanager с отправкой уведомлений в Telegram
# =============================================================================
# CRITICAL FIX: Telegram токены вынесены в переменные окружения
# Используйте EnvironmentFile в systemd service или docker-compose environment
# =============================================================================

global:
  # Время между повторными уведомлениями
  resolve_timeout: 5m

  # SMTP настройки (опционально, для email уведомлений)
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@example.com'
  # smtp_auth_username: 'alertmanager@example.com'
  # smtp_auth_password: 'password'

# Шаблоны уведомлений
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Маршрутизация алертов
route:
  # Получатель по умолчанию
  receiver: 'telegram-critical'

  # Группировка алертов
  group_by: ['alertname', 'severity', 'instance']

  # Время ожидания для группировки
  group_wait: 30s
  group_interval: 5m

  # Повторная отправка если алерт не решён
  repeat_interval: 4h

  # Маршруты по уровням критичности
  routes:
    - match:
        severity: critical
      receiver: 'telegram-critical'
      continue: true

    - match:
        severity: warning
      receiver: 'telegram-warning'

    - match:
        severity: info
      receiver: 'telegram-info'

# Получатели уведомлений
receivers:
  # Критические алерты - мгновенное уведомление
  # CRITICAL FIX: Токены берутся из переменных окружения
  - name: 'telegram-critical'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: '${TELEGRAM_CHAT_ID}'
        send_resolved: true
        parse_mode: Markdown
        api_url: 'https://api.telegram.org'

  # Предупреждения - уведомление с группировкой
  # CRITICAL FIX: Токены берутся из переменных окружения
  - name: 'telegram-warning'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: '${TELEGRAM_CHAT_ID}'
        send_resolved: true
        parse_mode: Markdown
        api_url: 'https://api.telegram.org'

  # Информационные - без уведомлений в Telegram (только в лог)
  - name: 'telegram-info'
    webhook_configs:
      - url: 'http://localhost:5001/info'
        send_resolved: true

# Подавление алертов (inhibition rules)
inhibit_rules:
  # Если критический алерт активен, подавить предупреждения для той же системы
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  # Если система полностью недоступна, подавить остальные алерты
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.+'
    equal: ['instance']
