# =============================================================================
# Kernel Hardening - Sysctl Configuration
# Описание: Безопасные настройки ядра для Ubuntu 24.04 LTS
# Важно: Настройки совместимы с Docker networking
# =============================================================================

# =============================================================================
# NETWORK SECURITY
# =============================================================================

# --- IP Spoofing Protection ---
# Игнорировать ICMP запросы на широковещательные адреса
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Игнорировать ICMP redirect сообщения
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Не отправлять ICMP redirect сообщения
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Включить защиту от spoofing (reverse path filtering)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Игнорировать ICMP timestamp запросы
net.ipv4.icmp_echo_ignore_all = 0

# Логировать martian packets (некорректные IP)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# --- Source Routing Protection ---
# Запретить source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# --- SYN Cookies Protection ---
# Защита от SYN flood атак
net.ipv4.tcp_syncookies = 1

# --- TCP/IP Stack Hardening ---
# Увеличить количество SYN backlog
net.ipv4.tcp_max_syn_backlog = 4096

# Увеличить максимальное количество сокетов
net.core.somaxconn = 4096

# Время ожидания для FIN packets
net.ipv4.tcp_fin_timeout = 15

# Включить TCP timestamps
net.ipv4.tcp_timestamps = 1

# Включить TCP window scaling
net.ipv4.tcp_window_scaling = 1

# --- IPv6 Security ---
# Отключить IPv6 если не используется (опционально)
# net.ipv6.conf.all.disable_ipv6 = 1
# net.ipv6.conf.default.disable_ipv6 = 1

# =============================================================================
# FILESYSTEM SECURITY
# =============================================================================

# Защита hardlinks
fs.protected_hardlinks = 2

# Защита symlinks
fs.protected_symlinks = 2

# Ограничить доступ к dmesg
kernel.dmesg_restrict = 1

# Ограничить доступ к kernel pointers
kernel.kptr_restrict = 2

# =============================================================================
# KERNEL SECURITY
# =============================================================================

# Ограничить ptrace scope
kernel.yama.ptrace_scope = 1

# Включить ASLR (Address Space Layout Randomization)
kernel.randomize_va_space = 2

# Core dump ограничения
fs.suid_dumpable = 0

# =============================================================================
# DOCKER COMPATIBILITY - DO NOT CHANGE
# =============================================================================

# IP forwarding - ТРЕБУЕТСЯ для Docker networking
net.ipv4.ip_forward = 1

# IPv6 forwarding - требуется для Docker с IPv6
net.ipv6.conf.all.forwarding = 1

# =============================================================================
# PERFORMANCE TUNING (Safe defaults)
# =============================================================================

# Увеличить file descriptor limit
fs.file-max = 2097152

# Увеличить max memory map areas
vm.max_map_count = 262144

# Swappiness - уменьшить использование swap
vm.swappiness = 10

# Overcommit memory - разрешить для производительности
vm.overcommit_memory = 1

# =============================================================================
# NOTES
# =============================================================================
# Применить настройки: sysctl -p /etc/sysctl.d/99-hardening.conf
# Проверить настройки: sysctl -a | grep <parameter>
# 
# ВАЖНО: Эти настройки не должны ломать Docker networking
# Если возникают проблемы с сетью, проверьте:
#   - net.ipv4.ip_forward = 1 (должен быть включён)
#   - net.ipv4.conf.all.rp_filter = 1 (может конфликтовать с некоторыми настройками Docker)
