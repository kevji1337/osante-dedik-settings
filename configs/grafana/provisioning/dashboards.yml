# =============================================================================
# Grafana Dashboards Provisioning
# Описание: Автоматическая загрузка дашбордов
# =============================================================================

apiVersion: 1

providers:
  - name: 'Server Monitoring'
    orgId: 1
    folder: 'Server'
    folderUid: 'server'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
